name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.16', '1.21', 'stable']
        exclude:
          # Race detector not available on Go 1.16
          - os: ubuntu-latest
            go: '1.16'
          - os: macos-latest
            go: '1.16'
          - os: windows-latest
            go: '1.16'
        include:
          # Test Go 1.16 compatibility without race detector
          - os: ubuntu-latest
            go: '1.16'
            race: false
          - os: macos-latest
            go: '1.16'
            race: false
          - os: windows-latest
            go: '1.16'
            race: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Test with race detector
        if: matrix.race != false
        run: go test -race ./...
