version: 2

builds:
  - id: c4
    main: ./cmd/c4/
    binary: c4
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: c4
    ids:
      - c4
    name_template: "c4_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ["zip"]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - name: c4
    ids:
      - c4
    repository:
      owner: Avalanche-io
      name: homebrew-tap
    homepage: "https://github.com/Avalanche-io/c4"
    description: "Universal content-addressable asset identification (SMPTE ST 2114)"
    install: |
      bin.install "c4"
